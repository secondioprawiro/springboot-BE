spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5436/training_db
    username: postgres
    password: 12345678
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8082
  servlet:
    context-path: /user-service

jwt:
  secret: 9f3c2b6a4e1d8f7c5a9b0e3d2c6f8a1b4d7e9c2f6a8b1d3e5c7f9a0b2d4e6f8c1a3b5d7f9e2c4a6b8d0f1e3c5a7b9d2
  expiration: 86400000

management:
  endpoint:
    prometheus:
      access: unrestricted
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}