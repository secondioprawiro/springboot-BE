version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: training_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  zookeeper-batch17:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper-batch17
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka-batch17:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-batch17
    depends_on:
      - zookeeper-batch17
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-batch17:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-batch17:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redpanda-batch17:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-batch17
    depends_on:
      - kafka-batch17
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKERS=kafka-batch17:29092

  redis-batch17:
    image: redis:7.2-alpine
    container_name: redis-batch17
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  redis-insight-batch17:
    image: redis/redisinsight:latest
    container_name: redis-insight-batch17
    restart: always
    ports:
      - "5540:5540"
    depends_on:
      - redis-batch17


volumes:
  postgres_data: