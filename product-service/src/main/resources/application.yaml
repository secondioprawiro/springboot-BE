spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/training_db
    username: postgres
    password: 12345678
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  cache:
    redis:
      time-to-live: 60000
    type: redis
    host: localhost
    port: 6379
    isCredential: false
    prefix: training_batch17
    default-ttl: 60

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8081
  servlet:
    context-path: /product-service

kafka:
  bootstrap-servers: localhost:9092