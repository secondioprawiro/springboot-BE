global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'gateway-service'
    metrics_path: '/gateway/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8762']

  - job_name: 'user-service'
    metrics_path: '/user-service/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']