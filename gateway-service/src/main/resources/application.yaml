spring:
  application:
    name: gateway-service

server:
  port: 8762
  servlet:
    context-path: /gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: 9f3c2b6a4e1d8f7c5a9b0e3d2c6f8a1b4d7e9c2f6a8b1d3e5c7f9a0b2d4e6f8c1a3b5d7f9e2c4a6b8d0f1e3c5a7b9d2
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}